baseURL = "https://musclelove-777.github.io/anime-navi/"
languageCode = "ja"
defaultContentLanguage = "ja"
title = "アニメエロナビ | エロアニメ・同人・ゲーム総合レビュー"
theme = "PaperMod"
paginate = 30

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[sitemap]
  changefreq = "daily"
  priority = 0.7
  filename = "sitemap.xml"

[params]
  env = "production"
  canonicalURL = true
  description = "エロアニメ・同人CG・ASMR・エロゲ・BL…二次元アダルトコンテンツを毎日更新。サンプル付きレビューサイト"
  author = "アニメエロナビ編集部"
  images = ["https://musclelove-777.github.io/anime-navi/favicon.svg"]
  keywords = ["エロアニメ おすすめ", "同人 FANZA ランキング", "ASMR アダルト", "エロゲ おすすめ", "同人CG 人気", "BL 同人", "触手 アニメ", "NTR アニメ", "異世界 エロ", "学園 エロアニメ", "同人ゲーム おすすめ", "アダルトコミック 人気"]
  defaultTheme = "dark"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = false
  TocOpen = false
  comments = false

  [params.homeInfoParams]
    Title = "アニメエロナビ"
    Content = "エロアニメ・同人・ゲーム・ASMR…二次元アダルトの全てを毎日レビュー！ Presented by MuscleLove"

  [[params.socialIcons]]
    name = "x-twitter"
    url = "https://x.com/MuscleGirlLove7"

  [[params.socialIcons]]
    name = "linktree"
    url = "https://linktr.ee/ILoveMyCats"

[params.assets]
  favicon = "favicon.svg"
  favicon16x16 = "favicon.svg"
  favicon32x32 = "favicon.svg"
  apple_touch_icon = "favicon.svg"
  safari_pinned_tab = "favicon.svg"

[params.cover]
  hidden = false
  hiddenInList = false
  hiddenInSingle = false
  linkFullImages = true

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

